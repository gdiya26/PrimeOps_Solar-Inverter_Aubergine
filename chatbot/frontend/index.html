<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiNED AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(26, 31, 44, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
        }

        .header-content h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-content p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .messages-area {
            flex-grow: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            display: flex;
            max-width: 80%;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        .bot .avatar {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            margin-right: 16px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .user .avatar {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            margin-left: 16px;
            border: 1px solid var(--glass-border);
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
        }

        .bot .bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
        }

        .user .bubble {
            background: var(--primary);
            color: white;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
        }

        .input-area {
            padding: 24px 32px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            padding: 12px 8px;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        button.send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button.send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        button.send-btn:active {
            transform: scale(0.95);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Markdown styling for bot reponses */
        .bubble strong {
            color: #fff;
            font-weight: 600;
        }

        .bubble em {
            color: var(--accent);
            font-style: normal;
        }

        .bubble code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="header-content">
                <h1>MiNED Intelligence</h1>
                <p><span class="status-dot"></span> System Online & Monitoring</p>
            </div>
        </header>

        <div class="messages-area" id="messages-area">
            <div class="message bot">
                <div class="avatar">AI</div>
                <div class="bubble">
                    Hello! I am your MiNED AI Assistant. I can help you with inverter diagnostics, failure prediction,
                    and general system inquiries. How can I assist you today?
                </div>
            </div>
        </div>

        <div class="input-area">
            <form id="chat-form" class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask about system status, prediction, or maintenance..."
                    autocomplete="off" required>
                <button type="submit" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const messagesArea = document.getElementById('messages-area');

        // Track conversation history locally
        let chatHistory = [];

        function appendMessage(sender, text, isMarkdown = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            avatarDiv.textContent = sender === 'bot' ? 'AI' : 'U';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';

            if (sender === 'bot') {
                // simple markdown parsing for bold, highlight, and line breaks
                let htmlFormat = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                htmlFormat = htmlFormat.replace(/\*(.*?)\*/g, '<em>$1</em>');
                htmlFormat = htmlFormat.replace(/\n/g, '<br>');

                // Add rudimentary support for Markdown bullets natively in HTML
                htmlFormat = htmlFormat.replace(/^- (.*)$/gm, '• $1');
                htmlFormat = htmlFormat.replace(/^\d+\. (.*)$/gm, '<strong>$&</strong>');

                bubbleDiv.innerHTML = htmlFormat;
            } else {
                bubbleDiv.textContent = text;
            }

            msgDiv.appendChild(avatarDiv);
            msgDiv.appendChild(bubbleDiv);

            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            return msgDiv;
        }

        function showTypingIndicator() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot typing-msg';
            msgDiv.innerHTML = `
                <div class="avatar">AI</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
            `;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            return msgDiv;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // show user msg
            appendMessage('user', message);
            chatHistory.push({ role: 'user', content: message });
            userInput.value = '';

            // show loading
            const indicator = showTypingIndicator();

            try {
                // Adjust port to match FastAPI setup
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: message, history: chatHistory })
                });

                if (!response.ok) throw new Error('API request failed');

                const data = await response.json();
                messagesArea.removeChild(indicator);
                appendMessage('bot', data.reply, true);
                chatHistory.push({ role: 'bot', content: data.reply });

            } catch (error) {
                console.error('Error:', error);
                messagesArea.removeChild(indicator);
                appendMessage('bot', "I'm sorry, I couldn't reach the backend server. Is it running on port 8000?");
            }
        });
    </script>
</body>

</html>
